[project]
name = "music-ai-scoring"
version = "0.1.0"
description = "Deterministic evidence-to-correction scoring for music_ai"
requires-python = ">=3.12,<3.13"
dependencies = ["music-ai-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/music_ai_scoring"]

[tool.uv.sources]
music-ai-contracts = { workspace = true }
