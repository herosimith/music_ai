[project]
name = "music-ai-contracts"
version = "0.1.0"
description = "Versioned contracts for music_ai services"
requires-python = ">=3.12,<3.13"
dependencies = ["pydantic>=2.13,<3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/music_ai_contracts"]
