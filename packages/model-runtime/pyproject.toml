[project]
name = "music-ai-model-runtime"
version = "0.1.0"
description = "Shared fail-closed model authorization and provenance for music_ai"
requires-python = ">=3.12,<3.13"
dependencies = ["music-ai-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/music_ai_model_runtime"]

[tool.uv.sources]
music-ai-contracts = { workspace = true }
