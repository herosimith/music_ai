name: music-ai

x-control-plane: &control-plane
  image: music-ai-control-plane:${MUSIC_AI_IMAGE_TAG:?set MUSIC_AI_IMAGE_TAG}
  build:
    context: ..
    dockerfile: deploy/Dockerfile.control-plane
  environment: &control-plane-environment
    MUSIC_AI_AUTO_CREATE_SCHEMA: "false"
    MUSIC_AI_DATABASE_HOST: postgres
    MUSIC_AI_DATABASE_NAME: music_ai
    MUSIC_AI_DATABASE_PASSWORD_FILE: /run/secrets/database_password
    MUSIC_AI_DATABASE_USER: music_ai_api
    MUSIC_AI_ENVIRONMENT: production
    MUSIC_AI_MAINTENANCE_INTERVAL_SECONDS: ${MUSIC_AI_MAINTENANCE_INTERVAL_SECONDS:-300}
    MUSIC_AI_MAX_UPLOAD_BYTES: "100000000"
    MUSIC_AI_OBJECT_STORE_ROOT: /data/objects
    MUSIC_AI_RAW_AUDIO_TTL_SECONDS: ${MUSIC_AI_RAW_AUDIO_TTL_SECONDS:-900}
    MUSIC_AI_TOKEN_PEPPER_FILE: /run/secrets/token_pepper
  secrets:
    - database_password
    - token_pepper
  networks:
    - database

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: music_ai
      POSTGRES_PASSWORD_FILE: /run/secrets/database_password
      POSTGRES_USER: music_ai_api
    secrets:
      - database_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_ai_api -d music_ai"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    <<: *control-plane
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  control-plane:
    <<: *control-plane
    command: ["api"]
    volumes:
      - object-store:/data/objects
    networks:
      - database
      - backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  maintenance:
    <<: *control-plane
    command: ["maintenance"]
    volumes:
      - object-store:/data/objects
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: music-ai-web:${MUSIC_AI_IMAGE_TAG:?set MUSIC_AI_IMAGE_TAG}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    networks:
      - edge
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  caddy:
    image: caddy:2.10.2-alpine
    environment:
      MUSIC_AI_SITE_ADDRESS: ${MUSIC_AI_SITE_ADDRESS:?set MUSIC_AI_SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge
      - backend
    depends_on:
      control-plane:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

networks:
  edge: {}
  backend:
    internal: true
  database:
    internal: true

volumes:
  caddy-config: {}
  caddy-data: {}
  object-store: {}
  postgres-data: {}

secrets:
  database_password:
    file: ${MUSIC_AI_DATABASE_PASSWORD_FILE:?set MUSIC_AI_DATABASE_PASSWORD_FILE}
  token_pepper:
    file: ${MUSIC_AI_TOKEN_PEPPER_FILE:?set MUSIC_AI_TOKEN_PEPPER_FILE}
